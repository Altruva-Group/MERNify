services:
  # MONGODB SHARDING SETUP

  ## Shards
  # Shards 01
  shard01:
    image: mongo:6.0
    container_name: shard01-node 
    command: mongod --port 27017 --shardsvr --replSet rs-shard-01 --dbpath /data/db  #--bind_ip_all
    volumes:
      - ~/db/shard01/mongod.conf:/etc/mongod.conf
      - ~/db/shard01/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard01/data/db/:/data/db
      - ~/db/shard01/log/:/var/log/mongodb/
      - mongodb_cluster_shard01_db:/data/db
      - mongodb_cluster_shard01_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    depends_on:
      - shard01-secondary
      - shard01-arbiter
    ports:
      - "50001:27017"
    networks: 
      - backend

  shard01-secondary:
    image: mongo:6.0
    container_name: shard01-secondary
    command: mongod --port 27017 --shardsvr --replSet rs-shard-01 --dbpath /data/db # --bind_ip_all
    volumes:
      - ~/db/shard01/mongod.conf:/etc/mongod.conf
      - ~/db/shard01/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard01/data/db/:/data/db
      - ~/db/shard01/log/:/var/log/mongodb/
      - mongodb_cluster_shard01_secondary_db:/data/db
      - mongodb_cluster_shard01_secondary_config:/data/
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    ports:
      - "50002:27017"
    networks: 
      - backend

  shard01-arbiter:
    image: mongo:6.0
    container_name: shard01-arbiter 
    command: mongod --port 27017 --shardsvr --replSet rs-shard-01 # --dbpath /data/db # --bind_ip_all
    volumes:
      - ~/db/shard01/mongod.conf:/etc/mongod.conf
      - ~/db/shard01/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard01/data/db/:/data/db
      - ~/db/shard01/log/:/var/log/mongodb/
      - mongodb_cluster_shard01_arbiter_db:/data/db
      - mongodb_cluster_shard01_arbiter_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    ports:
      - "50003:27017"
    networks: 
      - backend
    
  # Shards 02
  shard02:
    image: mongo:6.0
    container_name: shard02-node 
    command: mongod --port 27017 --shardsvr --replSet rs-shard-02 --dbpath /data/db #--bind_ip_all
    volumes:
      - ~/db/shard02/mongod.conf:/etc/mongod.conf
      - ~/db/shard02/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard02/data/db/:/data/db
      - ~/db/shard02/log/:/var/log/mongodb/
      - mongodb_cluster_shard02_db:/data/db
      - mongodb_cluster_shard02_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    depends_on:
      - shard02-secondary
      - shard02-arbiter
    ports:
      - "50004:27017"
    networks: 
      - backend

  shard02-secondary:
    image: mongo:6.0
    container_name: shard02-secondary
    command: mongod --port 27017 --shardsvr --replSet rs-shard-02 --dbpath /data/db #--bind_ip_all
    volumes:
      - ~/db/shard02/mongod.conf:/etc/mongod.conf
      - ~/db/shard02/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard02/data/db/:/data/db
      - ~/db/shard02/log/:/var/log/mongodb/
      - mongodb_cluster_shard02_secondary_db:/data/db
      - mongodb_cluster_shard02_secondary_config:/data/
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    ports:
      - "50005:27017"
    networks: 
      - backend

  shard02-arbiter:
    image: mongo:6.0
    container_name: shard02-arbiter 
    command: mongod --port 27017 --shardsvr --replSet rs-shard-02 # --dbpath /data/db #--bind_ip_all
    volumes:
      - ~/db/shard02/mongod.conf:/etc/mongod.conf
      - ~/db/shard02/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard02/data/db/:/data/db
      - ~/db/shard02/log/:/var/log/mongodb/
      - mongodb_cluster_shard02_arbiter_db:/data/db
      - mongodb_cluster_shard02_arbiter_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    ports:
      - "50006:27017"
    networks: 
      - backend

  # Shards 03
  shard03:
    image: mongo:6.0
    container_name: shard03-node 
    command: mongod --port 27017 --shardsvr --replSet rs-shard-03 --dbpath /data/db #--bind_ip_all
    volumes:
      - ~/db/shard03/mongod.conf:/etc/mongod.conf
      - ~/db/shard03/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard03/data/db/:/data/db
      - ~/db/shard03/log/:/var/log/mongodb/
      - mongodb_cluster_shard03_db:/data/db
      - mongodb_cluster_shard03_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    depends_on:
      - shard03-secondary
      - shard03-arbiter
    ports:
      - "50007:27017"
    networks: 
      - backend

  shard03-secondary:
    image: mongo:6.0
    container_name: shard03-secondary
    command: mongod --port 27017 --shardsvr --replSet rs-shard-03 --dbpath /data/db #--bind_ip_all
    volumes:
      - ~/db/shard03/mongod.conf:/etc/mongod.conf
      - ~/db/shard03/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard03/data/db/:/data/db
      - ~/db/shard03/log/:/var/log/mongodb/
      - mongodb_cluster_shard03_secondary_db:/data/db
      - mongodb_cluster_shard03_secondary_config:/data/
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    ports:
      - "50008:27017"
    networks: 
      - backend

  shard03-arbiter:
    image: mongo:6.0
    container_name: shard03-arbiter 
    command: mongod --port 27017 --shardsvr --replSet rs-shard-03 # --dbpath /data/db #--bind_ip_all
    volumes:
      - ~/db/shard03/mongod.conf:/etc/mongod.conf
      - ~/db/shard03/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/shard03/data/db/:/data/db
      - ~/db/shard03/log/:/var/log/mongodb/
      - mongodb_cluster_shard03_arbiter_db:/data/db
      - mongodb_cluster_shard03_arbiter_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always
    ports:
      - "50009:27017"
    networks: 
      - backend

  # Config Servers
  configsvr01:
    image: mongo:6.0
    container_name: configsvr01
    command: mongod --port 27017 --configsvr --replSet rs-config-server --dbpath /data/db --bind_ip_all
    volumes:
      - ~/db/configsvr01/mongod.conf:/etc/mongod.conf
      - ~/db/configsvr01/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/configsvr01/data/db/:/data/db
      - ~/db/configsvr01/log/:/var/log/mongodb/
      - mongodb_cluster_configsvr01_db:/data/db
      - mongodb_cluster_configsvr01_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always 
    # depends_on: ["shard01", "shard02", "shard03"]
    ports:
      - "40001:27017"
    networks: 
      - backend

  configsvr02:
    image: mongo:6.0
    container_name: configsvr02
    command: mongod --port 27017 --configsvr --replSet rs-config-server --dbpath /data/db --bind_ip_all
    volumes:
      - ~/db/configsvr02/mongod.conf:/etc/mongod.conf
      - ~/db/configsvr02/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/configsvr02/data/db/:/data/db
      - ~/db/configsvr02/log/:/var/log/mongodb/
      - mongodb_cluster_configsvr02_db:/data/db
      - mongodb_cluster_configsvr02_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always 
    depends_on: 
      - configsvr01
    ports:
      - "40002:27017"
    networks: 
      - backend

  configsvr03:
    image: mongo:6.0
    container_name: configsvr03
    command: mongod --port 27017 --configsvr --replSet rs-config-server --dbpath /data/db --bind_ip_all
    volumes:
      - ~/db/configsvr03/mongod.conf:/etc/mongod.conf
      - ~/db/configsvr03/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/configsvr03/data/db/:/data/db
      - ~/db/configsvr03/log/:/var/log/mongodb/
      - mongodb_cluster_configsvr03_db:/data/db
      - mongodb_cluster_configsvr03_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    restart: always 
    depends_on:
      - configsvr02 
    ports:
      - "40003:27017"
    networks: 
      - backend

  # Routers
  router01:
    image: mongo:6.0
    container_name: router01
    command: mongos --port 27017 --configdb rs-config-server/configsvr01:27017,configsvr02:27017,configsvr03:27017 --bind_ip_all
    ports:
      - "27117:27017"
    restart: always
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=${MONGODB_INITDB_ROOT_USERNAME}
      - MONGODB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD}
      - MONGODB_INITDB_DATABASE=${MONGODB_INITDB_DATABASE}
    volumes:
      - ./mongo/scripts:/mongo/scripts:ro
      - ~/db/router01/mongod.conf:/etc/mongod.conf
      - ~/db/router01/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/router01/data/db/:/data/db
      - ~/db/router01/log/:/var/log/mongodb/
      - mongodb_cluster_router01_db:/data/db
      - mongodb_cluster_router01_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    networks: 
      - backend
    depends_on:
      - configsvr01
      - configsvr02
      - configsvr03

  router02:
    image: mongo:6.0
    container_name: router02
    command: mongos --port 27017 --configdb rs-config-server/configsvr01:27017,configsvr02:27017,configsvr03:27017 --bind_ip_all
    ports:
      - "27118:27017"
    restart: always
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=${MONGODB_INITDB_ROOT_USERNAME}
      - MONGODB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD}
      - MONGODB_INITDB_DATABASE=${MONGODB_INITDB_DATABASE}
    volumes:
      - ./mongo/scripts:/mongo/scripts:ro
      - ~/db/router02/mongod.conf:/etc/mongod.conf
      - ~/db/router02/initdb.d/:/docker-entrypoint-initdb.d/
      # - ~/db/router02/data/db/:/data/db
      - ~/db/router02/log/:/var/log/mongodb/
      - mongodb_cluster_router02_db:/data/db
      - mongodb_cluster_router02_config:/data/configdb
      - ./mongo/key/mongodb.key:/mongodb.key:ro
    networks: 
      - backend
    depends_on:
      - configsvr01
      - configsvr02
      - configsvr03

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks: 
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    networks: 
      - backend

  elasticsearch:
    image: elasticsearch:8.2.0
    container_name: elasticsearch
    restart: always
    volumes:
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      # - ./elasticsearch/certs:/usr/share/elasticsearch/config/certs
    environment:
      - LS_JAVA_OPTS="-Xmx256m -Xms256m"
      - discovery.type=single-node
      # - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "9200:9200"
    networks: 
      - backend

  logstash:
    image: logstash:8.2.0
    container_name: logstash
    restart: always
    depends_on: ["kafka", "elasticsearch"]
    volumes:
      - ./logstash/:/logstash_dir
    command: logstash -f /logstash_dir/logstash.conf
    ports:
      - "9600:9600"
    networks: 
      - backend

  kibana:
    image: kibana:8.2.0
    container_name: kibana
    restart: always
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    networks: 
      - backend

  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"
    volumes:
    - zookeeper_data:/data
    networks: 
      - backend
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zookeeper:2888:3888;2181

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_MESSAGE_MAX_BYTES=200000000  # max message size to 200MB
      - KAFKA_REPLICA_FETCH_MAX_BYTES=200000000  # max fetch size to 200MB
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false # Disable auto-creation
      - KAFKA_DELETE_TOPIC_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    networks:
      - backend 

  api01:
    container_name: api01
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "10000:10000"
    environment:
      - API_PORT=${API_PORT}
      - DEV_MODE=${DEV_MODE}
      - MONGODB_URI=${MONGODB_URI}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - EMAIL_CONFIRMATION_TOKEN_SECRET=${EMAIL_CONFIRMATION_TOKEN_SECRET}
      - FORGOT_PASSWORD_TOKEN_SECRET=${FORGOT_PASSWORD_TOKEN_SECRET}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - REDIRECT_URL=${REDIRECT_URL}
      - COMPANY_NAME=${COMPANY_NAME}
      - COMPANY_EMAIL=${COMPANY_EMAIL}
      - GMAIL_USERNAME=${GMAIL_USERNAME}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NODE_OPTIONS=--max-old-space-size=1024
      - WORKER_COUNT=3
      - REDIS_URI=${REDIS_URI}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    restart: "on-failure"
    depends_on: ["kafka", "logstash", "grafana", "router01", "router02", "redis"]
    # deploy: 
    #   mode: replicated
    #   replicas: 2
    #   endpoint_mode: vip
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M
    networks: 
      - backend

  api02:
    container_name: api02
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "1001:1000"
    environment:
      - API_PORT=${API_PORT}
      - DEV_MODE=${DEV_MODE}
      - MONGODB_URI=${MONGODB_URI}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - EMAIL_CONFIRMATION_TOKEN_SECRET=${EMAIL_CONFIRMATION_TOKEN_SECRET}
      - FORGOT_PASSWORD_TOKEN_SECRET=${FORGOT_PASSWORD_TOKEN_SECRET}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - REDIRECT_URL=${REDIRECT_URL}
      - COMPANY_NAME=${COMPANY_NAME}
      - COMPANY_EMAIL=${COMPANY_EMAIL}
      - GMAIL_USERNAME=${GMAIL_USERNAME}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NODE_OPTIONS=--max-old-space-size=1024
      - WORKER_COUNT=3
      - REDIS_URI=${REDIS_URI}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    restart: "on-failure"
    depends_on: ["kafka", "logstash", "grafana", "router01", "router02", "redis"]
    networks: 
      - backend

  client:
    container_name: client
    build:
      context: .  
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
    environment:
      VITE_API_URL: "${API_URL}"
    depends_on:
      - api01
      - api02
    networks:
      - frontend
      - backend

  nginx:
    image: nginx
    hostname: nginx
    container_name: nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./ssl:/etc/nginx/ssl
    ports:
      - "443:443"
      - "8000:8000"
      - "5555:5555"
    depends_on:
      - api01
      - api02
      - client
    # deploy:
    #   replicas: 1
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 256M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 128M
    networks:
      - frontend
      - backend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  mongodb_cluster_router01_db:
  mongodb_cluster_router01_config:

  mongodb_cluster_router02_db:
  mongodb_cluster_router02_config:

  mongodb_cluster_configsvr01_db:
  mongodb_cluster_configsvr01_config:

  mongodb_cluster_configsvr02_db:
  mongodb_cluster_configsvr02_config:

  mongodb_cluster_configsvr03_db:
  mongodb_cluster_configsvr03_config:

  mongodb_cluster_shard01_db:
  mongodb_cluster_shard01_config:
  mongodb_cluster_shard01_secondary_db:
  mongodb_cluster_shard01_secondary_config:
  mongodb_cluster_shard01_arbiter_db:
  mongodb_cluster_shard01_arbiter_config:

  mongodb_cluster_shard02_db:
  mongodb_cluster_shard02_config:
  mongodb_cluster_shard02_secondary_db:
  mongodb_cluster_shard02_secondary_config:
  mongodb_cluster_shard02_arbiter_db:
  mongodb_cluster_shard02_arbiter_config:

  mongodb_cluster_shard03_db:
  mongodb_cluster_shard03_config:
  mongodb_cluster_shard03_secondary_db:
  mongodb_cluster_shard03_secondary_config:
  mongodb_cluster_shard03_arbiter_db:
  mongodb_cluster_shard03_arbiter_config:

  redis_data:
  kafka_data:
  zookeeper_data:
  grafana-storage: {}
