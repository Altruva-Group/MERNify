upstream api_server {
    least_conn;  # Distributes requests to the least busy server
    server api01:5000;
    server api02:5001;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    # server_name example.com www.example.com;

    # HTTPS configuration (recommended)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    root /usr/share/nginx/html; # Path where Vite's 'dist' folder is
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        add_header Content-Type "";
    }

    # Proxy API requests to Docker Swarm service (auto load-balancing)
    location /api {
        proxy_pass http://api_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|otf|svg|mp4|webm|ogg|mp3|wav|flac|aac|json|xml|txt)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}